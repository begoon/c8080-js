<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>c8080 playground — C to Intel 8080 asm</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>c8080 <span class="sub">C → Intel 8080 asm, in your browser</span></h1>
      <div class="status" id="status"></div>
    </header>
    <main>
      <section class="pane">
        <div class="pane-title">source.c</div>
        <textarea
          id="source"
          spellcheck="false"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          wrap="off"
        ></textarea>
      </section>
      <section class="pane">
        <div class="pane-title">output.asm</div>
        <pre id="asm"></pre>
        <div id="error" class="error" hidden></div>
        <div class="pane-title secondary">bytes (from ORG 0x0100)</div>
        <pre id="bytes" hidden></pre>
      </section>
    </main>
    <footer>
      c8080 ·
      <a href="https://www.npmjs.com/package/c8080">npm</a> ·
      <a href="https://github.com/alexey-f-morozov/c8080">upstream</a>
    </footer>
    <script type="module" src="playground.js"></script>
  </body>
</html>
