<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>c8080 playground — C to Intel 8080 asm</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>c8080 <span class="sub">C → Intel 8080 asm, in your browser</span></h1>
      <div class="toolbar">
        <div class="status" id="status"></div>
        <select id="download-format" title="download format">
          <option value="c">.c</option>
          <option value="asm">.asm</option>
          <option value="bin">.bin</option>
          <option value="rks">.rks</option>
          <option value="rk" selected>.rk</option>
          <option value="rkr">.rkr</option>
          <option value="pki">.pki</option>
          <option value="gam">.gam</option>
        </select>
        <button type="button" id="download">Download</button>
        <button type="button" id="reset" class="danger" title="replace the source with the starter example">Reset</button>
        <button type="button" id="theme" class="icon-btn" title="toggle light/dark theme" aria-label="toggle light/dark theme">
          <svg class="icon icon-sun" viewBox="0 0 24 24" aria-hidden="true" width="16" height="16">
            <circle cx="12" cy="12" r="4" fill="currentColor"/>
            <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="12" y1="2"  x2="12" y2="5"/>
              <line x1="12" y1="19" x2="12" y2="22"/>
              <line x1="2"  y1="12" x2="5"  y2="12"/>
              <line x1="19" y1="12" x2="22" y2="12"/>
              <line x1="4.9"  y1="4.9"  x2="7"    y2="7"/>
              <line x1="17"   y1="17"   x2="19.1" y2="19.1"/>
              <line x1="4.9"  y1="19.1" x2="7"    y2="17"/>
              <line x1="17"   y1="7"    x2="19.1" y2="4.9"/>
            </g>
          </svg>
          <svg class="icon icon-moon" viewBox="0 0 24 24" aria-hidden="true" width="16" height="16">
            <path d="M20 14.5A8 8 0 0 1 9.5 4a0.5 0.5 0 0 0-0.7-0.6A10 10 0 1 0 20.6 15.2a0.5 0.5 0 0 0-0.6-0.7z" fill="currentColor"/>
          </svg>
        </button>
        <button
          type="button"
          id="run"
          class="primary"
          title="assemble as .rk and boot on rk86.ru/beta"
        >Run on RK86 ▸</button>
      </div>
    </header>
    <main>
      <section class="pane">
        <div class="pane-title">source.c</div>
        <textarea
          id="source"
          spellcheck="false"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          wrap="off"
        ></textarea>
      </section>
      <section class="pane">
        <div class="pane-title">output.asm</div>
        <pre id="asm"></pre>
        <div id="error" class="error" hidden></div>
        <div class="pane-title secondary">bytes</div>
        <pre id="bytes" hidden></pre>
      </section>
    </main>
    <footer>
      c8080 ·
      <a href="https://www.npmjs.com/package/c8080">npm</a> ·
      <a href="https://github.com/alexey-f-morozov/c8080">upstream</a>
    </footer>
    <div id="confirm-modal" class="modal" hidden>
      <div class="modal-panel" role="dialog" aria-modal="true">
        <p id="confirm-message"></p>
        <div class="modal-actions">
          <button type="button" id="confirm-cancel">Cancel</button>
          <button type="button" id="confirm-ok" class="primary">OK</button>
        </div>
      </div>
    </div>
    <script src="conf.js"></script>
    <script type="module" src="playground.js"></script>
  </body>
</html>
